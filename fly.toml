app = "gitdiagram"

primary_region = "sin"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  NEXT_PUBLIC_GENERATION_BACKEND = "next"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
